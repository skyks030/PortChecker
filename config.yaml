teams_webhook_url: https://example.com/global
monitoring:
  check_interval: 15
  check_timeout: 10
  failure_threshold: 1
  ravenna:
    ptp_domain: 0
    ptp_multicast: 224.0.1.129
    ptp_ports:
    - 319
    - 320
    audio_dscp: 34
    ptp_dscp: 46
server:
  host: 0.0.0.0
  port: 8000
troubleshooting:
- id: no-sound
  title: Kein Ton
  description: Probleme mit Audio-Streams oder Verbindungen
  icon: 🔊
  check_tags:
  - audio
  - rtp
  - ptp
  - connection
- id: no-image
  title: Kein Bild
  description: Probleme mit Video-Signalen oder GUI
  icon: 📺
  check_tags:
  - video
  - rtsp
  - app
  - connection
- id: connection-issue
  title: Keine Verbindung
  description: Netzwerk- oder Internetprobleme
  icon: 🔌
  check_tags:
  - connection
  - ping
  - dns
devices:
- name: QSYS
  checks:
  - type: ping
    target: 192.168.123.157
    tags:
    - connection
    - ping
  - type: port
    host: 192.168.123.157
    port: 80
    description: Port 80
    tags:
    - app
  notifications_enabled: true
- name: TestServer
  checks:
  - type: ping
    target: 8.8.4.4
    tags:
    - connection
    - ping
  - type: port
    host: 8.8.4.4
    port: 53
    description: Port 53
    tags:
    - app
  notifications_enabled: true
  webhook_url: https://example.com/specific
  use_global_webhook: false
- name: TestServerSilent
  checks:
  - type: ping
    target: 8.8.8.8
    tags:
    - connection
    - ping
  - type: port
    host: 8.8.8.8
    port: 53
    description: Port 53
    tags:
    - app
  notifications_enabled: false
  webhook_url: https://example.com/specific-silent
  use_global_webhook: true
- name: dwcwc
  checks:
  - type: port
    host: 192.168.7.1
    port: 80
    description: Port 80
    tags:
    - app
  notifications_enabled: true
  webhook_url: null
  use_global_webhook: true
